{% extends "base.html" %}

{% block title %}Completar Cadastro - PrestaServiços{% endblock %}

{% block content %}
<style>
    .card-header-custom {
        background: linear-gradient(135deg, #0b2b5c, #1a6d8f);
        color: white;
        border-bottom: none;
        border-radius: 1rem 1rem 0 0;
        padding: 1.2rem;
    }
    .btn-completar {
        background: linear-gradient(135deg, #10b981, #059669);
        border: none;
        border-radius: 60px;
        padding: 10px;
        font-weight: 600;
        transition: all 0.2s;
        color: white;
    }
    .btn-completar:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(16,185,129,0.3);
        background: linear-gradient(135deg, #059669, #047857);
    }
    .form-control:focus {
        border-color: #0b2b5c;
        box-shadow: 0 0 0 3px rgba(11,43,92,0.15);
    }
    .form-check-input:checked {
        background-color: #0b2b5c;
        border-color: #0b2b5c;
    }
</style>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                <div class="card-header-custom">
                    <h4 class="mb-0 fw-semibold">
                        <i class="fab fa-google me-2"></i> Completar Cadastro
                    </h4>
                </div>
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-circle fa-4x" style="color: #1a6d8f;"></i>
                        <h5 class="mt-3 fw-bold">{{ usuario.nome }}</h5>
                        <p class="text-muted">{{ usuario.email }}</p>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="telefone" class="form-label fw-semibold">
                                <i class="fas fa-phone me-1 text-primary"></i> Telefone
                            </label>
                            <input type="tel" class="form-control rounded-pill" id="telefone" name="telefone" required>
                            <small class="text-muted">Ex: (11) 99999-9999</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-user-tag me-1 text-primary"></i> Tipo de Conta
                            </label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo" id="cliente" value="cliente" checked>
                                <label class="form-check-label" for="cliente">
                                    <i class="fas fa-user"></i> Cliente - Quero contratar serviços
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo" id="prestador" value="prestador">
                                <label class="form-check-label" for="prestador">
                                    <i class="fas fa-briefcase"></i> Prestador - Quero oferecer serviços
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-completar w-100">
                            <i class="fas fa-check-circle me-2"></i> Completar Cadastro
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('telefone').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 10) {
            value = value.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
        } else {
            value = value.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
        }
        e.target.value = value;
    });
</script>
{% endblock %}
