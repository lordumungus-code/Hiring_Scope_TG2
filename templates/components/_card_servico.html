<!-- Card de Serviço (reutilizável) -->
<div class="card featured-card h-100 border-0 rounded-4 shadow-sm overflow-hidden transition">
    {% if servico.imagem_base64 %}
        <img src="data:image/jpeg;base64,{{ servico.imagem_base64 }}" class="card-img-top" style="height: 180px; object-fit: cover;">
    {% else %}
        <div class="card-img-top d-flex align-items-center justify-content-center bg-gradient" style="height: 180px; background: linear-gradient(135deg, #e0e7ff, #f3e8ff);">
            <i class="fas fa-briefcase fa-4x text-primary opacity-50"></i>
        </div>
    {% endif %}
    <div class="card-body p-3 p-md-4">
        <span class="badge bg-primary mb-2 px-2 px-md-3 py-2 rounded-pill" style="font-size: clamp(0.7rem, 3vw, 0.85rem);">{{ servico.categoria }}</span>
        <h5 class="card-title fw-bold mb-2" style="font-size: clamp(1rem, 4vw, 1.25rem);">{{ servico.titulo[:50] }}</h5>
        <p class="card-text text-muted small mb-2">{{ servico.descricao[:80] }}...</p>
        <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
            {% if servico.preco %}
                <span class="price fw-bold text-primary" style="font-size: clamp(1rem, 4vw, 1.25rem);">R$ {{ "%.2f"|format(servico.preco) }}</span>
            {% endif %}
            <a href="{{ url_for('servico.detalhe', id=servico.id) }}" class="btn btn-primary btn-sm rounded-pill px-3" style="font-size: clamp(0.75rem, 3vw, 0.85rem);">Ver detalhes</a>
        </div>
    </div>
</div>
