{% extends "base.html" %}

{% block title %}Login com Google - PrestaServiços{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">
                        <i class="fab fa-google me-2"></i> Login com Google
                    </h4>
                </div>
                <div class="card-body text-center py-5">
                    <p>Clique no botão abaixo para fazer login com sua conta Google</p>
                    
                    <button id="google-login-btn" class="btn btn-danger btn-lg px-5 mt-3">
                        <i class="fab fa-google me-2"></i> Continuar com Google
                    </button>
                    
                    <div id="loading" style="display: none;" class="mt-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                        <p class="mt-2">Aguarde...</p>
                    </div>
                    
                    <div id="error-message" class="alert alert-danger mt-3" style="display: none;"></div>
                    
                    <hr class="my-4">
                    
                    <a href="/login" class="text-decoration-none">
                        <i class="fas fa-arrow-left me-1"></i> Voltar para login tradicional
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
    // Configuração do Firebase - use seus dados
    const firebaseConfig = {
        apiKey: "AIzaSyANfk1Nlat3JjepQq7lClbmu6xImva_W6Y",
        authDomain: "hiring-scope.firebaseapp.com",
        projectId: "hiring-scope",
        storageBucket: "hiring-scope.firebasestorage.app",
        messagingSenderId: "400656444315",
        appId: "1:400656444315:web:cff12e5a8a7593fde20f3e"
    };
    
    // Inicializa Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    
    // Botão de login
    const loginBtn = document.getElementById('google-login-btn');
    const loading = document.getElementById('loading');
    const errorDiv = document.getElementById('error-message');
    
    loginBtn.addEventListener('click', function() {
        loginBtn.disabled = true;
        loading.style.display = 'block';
        errorDiv.style.display = 'none';
        
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.addScope('profile');
        provider.addScope('email');
        
        // Usar popup
        auth.signInWithPopup(provider)
            .then((result) => {
                // Pega o token ID do usuário
                return result.user.getIdToken();
            })
            .then((idToken) => {
                // Envia o token para o backend
                return fetch('/auth/firebase/callback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ idToken: idToken })
                });
            })
            .then(response => response.json())
            .then(data => {
                if (data.redirect) {
                    window.location.href = data.redirect;
                } else if (data.success) {
                    window.location.href = '/';
                } else {
                    throw new Error(data.error || 'Erro desconhecido');
                }
            })
            .catch((error) => {
                console.error('Erro:', error);
                loginBtn.disabled = false;
                loading.style.display = 'none';
                errorDiv.style.display = 'block';
                
                if (error.code === 'auth/popup-blocked') {
                    errorDiv.innerHTML = `
                        <strong>Popup bloqueado!</strong><br>
                        O navegador bloqueou a janela de login. 
                        <a href="#" id="redirect-link" class="alert-link">Clique aqui para continuar</a>.
                    `;
                    document.getElementById('redirect-link').addEventListener('click', function(e) {
                        e.preventDefault();
                        auth.signInWithRedirect(provider);
                    });
                } else {
                    errorDiv.textContent = 'Erro: ' + error.message;
                }
            });
    });
</script>
{% endblock %}
